<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scriptorium Telemetry Dashboard</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --accent: #58a6ff;
            --text-main: #c9d1d9;
            --text-muted: #8b949e;
            --border: #30363d;
            --green: #238636;
            --red: #da3633;
            --gray: #484f58;
            --blue: #1f6feb;
            --purple: #8957e5;
            
            --font-main: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            --font-mono: ui-monospace, SFMono-Regular, SF Mono, Menlo, Consolas, Liberation Mono, monospace;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-main);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            background-color: var(--card-bg);
            border-bottom: 1px solid var(--border);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-title {
            font-size: 1.25rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .header-controls {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        select, button {
            background-color: var(--bg-color);
            color: var(--text-main);
            border: 1px solid var(--border);
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            font-family: var(--font-main);
            font-size: 0.875rem;
        }

        select:focus, button:focus {
            outline: none;
            border-color: var(--accent);
        }

        button {
            cursor: pointer;
        }

        button:hover {
            background-color: var(--border);
        }

        .auto-refresh-toggle {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.875rem;
            color: var(--text-muted);
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 2rem;
            padding: 0 2rem;
            border-bottom: 1px solid var(--border);
        }

        .tab {
            padding: 1rem 0;
            cursor: pointer;
            color: var(--text-muted);
            border-bottom: 2px solid transparent;
            font-weight: 500;
        }

        .tab.active {
            color: var(--text-main);
            border-bottom-color: var(--accent);
        }

        .tab:hover:not(.active) {
            color: var(--text-main);
        }

        /* Content */
        .content {
            padding: 2rem;
            flex: 1;
            display: none;
        }

        .content.active {
            display: block;
        }

        /* Overview Tab */
        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 1.25rem;
        }

        .card-title {
            font-size: 0.875rem;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
        }

        .card-value {
            font-size: 1.5rem;
            font-weight: 600;
        }

        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 1rem;
        }

        .chart-container {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 1.25rem;
        }

        .chart-header {
            font-weight: 600;
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--border);
        }

        /* CSS Bar Charts */
        .bar-chart {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .bar-row {
            display: flex;
            align-items: center;
            gap: 1rem;
            font-size: 0.875rem;
        }

        .bar-label {
            width: 100px;
            text-align: right;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .bar-track {
            flex: 1;
            background-color: var(--bg-color);
            border-radius: 3px;
            height: 12px;
            overflow: hidden;
            display: flex;
        }

        .bar-fill {
            height: 100%;
            background-color: var(--accent);
            border-radius: 3px;
        }

        .bar-value {
            width: 40px;
            text-align: right;
            font-variant-numeric: tabular-nums;
            color: var(--text-muted);
        }

        /* Hook type breakdown colors */
        .bar-fill.type-stop { background-color: var(--blue); }
        .bar-fill.type-subagent-stop { background-color: var(--purple); }
        .bar-fill.type-session-end { background-color: var(--green); }

        /* Events Table */
        .table-container {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.875rem;
        }

        th, td {
            padding: 0.75rem 1rem;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }

        th {
            color: var(--text-muted);
            font-weight: 600;
            background-color: rgba(0,0,0,0.2);
        }

        .mono {
            font-family: var(--font-mono);
            font-size: 0.8rem;
        }

        .decision-ingest { color: var(--green); font-weight: bold; }
        .decision-skip { color: var(--text-muted); }
        .decision-veto { color: var(--red); font-weight: bold; }
        
        tr.row-ingest { border-left: 3px solid var(--green); }
        tr.row-skip { border-left: 3px solid var(--gray); }
        tr.row-veto { border-left: 3px solid var(--red); }

        /* Health Tab */
        .health-grid {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .health-item {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 1.25rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .health-status {
            font-weight: bold;
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            font-size: 0.75rem;
            text-transform: uppercase;
        }

        .status-pass { background-color: rgba(35, 134, 54, 0.2); color: var(--green); }
        .status-warn { background-color: rgba(210, 153, 34, 0.2); color: #d29922; }
        .status-fail { background-color: rgba(218, 54, 51, 0.2); color: var(--red); }

        .health-details {
            flex: 1;
        }
        
        .health-name {
            font-weight: 600;
            margin-bottom: 0.25rem;
        }
        
        .health-msg {
            font-size: 0.875rem;
            color: var(--text-muted);
        }

        /* Per-tab inline error banner */
        .tab-error {
            border: 1px solid var(--red);
            color: var(--red);
            padding: 0.75rem 1rem;
            margin-bottom: 1rem;
            border-radius: 6px;
            display: none;
        }
        .tab-error.visible { display: block; }

        /* Utilities */
        .lag-indicator {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.875rem;
            color: var(--text-muted);
        }
        .lag-indicator .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: var(--green);
        }
        .lag-warning .dot { background-color: #d29922; }
        .lag-error .dot { background-color: var(--red); }

        /* Loader */
        .loading-overlay {
            position: fixed;
            top: 0; right: 0; bottom: 0; left: 0;
            background: rgba(13, 17, 23, 0.7);
            justify-content: center;
            align-items: center;
            z-index: 100;
            display: none;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(88, 166, 255, 0.3);
            border-radius: 50%;
            border-top-color: var(--accent);
            animation: spin 1s ease-in-out infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .last-updated {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-right: 1rem;
        }
    </style>
</head>
<body>
    <header>
        <div class="header-title">
            <svg height="24" viewBox="0 0 16 16" width="24" fill="currentColor">
                <title>Dashboard Icon</title>
                <path fill-rule="evenodd" d="M1.5 1.75C1.5 1.336 1.836 1 2.25 1h11.5c.414 0 .75.336.75.75v12.5a.75.75 0 01-.75.75H2.25a.75.75 0 01-.75-.75V1.75zM3 2.5v11h10V2.5H3zm4.5 9a.75.75 0 000 1.5h4a.75.75 0 000-1.5h-4zm-2.5-3a.75.75 0 000 1.5h6.5a.75.75 0 000-1.5H5zM5 5.5a.75.75 0 01.75-.75h6.5a.75.75 0 010 1.5h-6.5A.75.75 0 015 5.5z"></path>
            </svg>
            Scriptorium Telemetry
        </div>
        <div class="header-controls">
            <span class="last-updated" id="lastUpdated">Updated: Never</span>
            
            <label class="auto-refresh-toggle">
                <input type="checkbox" id="autoRefresh" checked>
                Auto-refresh (10s)
            </label>
            
            <select id="timeWindow">
                <option value="3600000">Last 1 Hour</option>
                <option value="21600000">Last 6 Hours</option>
                <option value="86400000" selected>Last 24 Hours</option>
                <option value="604800000">Last 7 Days</option>
            </select>
            
            <button id="refreshBtn">Refresh Now</button>
        </div>
    </header>

    <div class="tabs">
        <div class="tab active" data-target="overview">Overview</div>
        <div class="tab" data-target="events">Events</div>
        <div class="tab" data-target="health">Health</div>
    </div>

    <!-- Overview Tab -->
    <main id="overview" class="content active">
        <div class="tab-error" id="error-overview"></div>
        <div class="summary-grid">
            <div class="card">
                <div class="card-title">Total Events</div>
                <div class="card-value" id="stat-total-events">-</div>
            </div>
             <div class="card">
                 <div class="card-title" id="stat-ingests-label">Ingests Today</div>
                 <div class="card-value" id="stat-ingests">-</div>
             </div>
            <div class="card">
                <div class="card-title">Skipped</div>
                <div class="card-value" id="stat-skipped">-</div>
            </div>
            <div class="card">
                <div class="card-title">Vetoed</div>
                <div class="card-value" id="stat-vetoed">-</div>
            </div>
            <div class="card">
                <div class="card-title">Average Score</div>
                <div class="card-value" id="stat-avg-score">-</div>
            </div>
            <div class="card">
                <div class="card-title">Peak Score</div>
                <div class="card-value" id="stat-peak-score">-</div>
            </div>
        </div>

        <div style="margin-bottom: 2rem; display: flex; justify-content: space-between; align-items: center;">
            <div class="lag-indicator" id="lagIndicator">
                <div class="dot"></div>
                <span id="walCheckpointText">WAL checkpoint: unknown</span>
            </div>
            <div style="font-size: 0.875rem; color: var(--text-muted);">
                Last Ingest: <span id="lastIngestTs" class="mono">-</span>
            </div>
        </div>

        <div class="charts-grid">
            <div class="chart-container">
                <div class="chart-header">Score Distribution</div>
                <div class="bar-chart" id="chart-scores">
                    <!-- Populated by JS -->
                </div>
            </div>

            <div class="chart-container">
                <div class="chart-header">Top Signals</div>
                <div class="bar-chart" id="chart-signals">
                    <!-- Populated by JS -->
                </div>
            </div>

            <div class="chart-container">
                <div class="chart-header">Hook Types</div>
                <div class="bar-chart" id="chart-hooks">
                    <!-- Populated by JS -->
                </div>
            </div>
        </div>
    </main>

    <!-- Events Tab -->
    <main id="events" class="content">
        <div class="tab-error" id="error-events"></div>
        <div style="margin-bottom: 1rem; display: flex; justify-content: flex-end;">
            <select id="eventsLimit">
                <option value="50" selected>50 events</option>
                <option value="100">100 events</option>
                <option value="500">500 events</option>
            </select>
        </div>
        
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Timestamp</th>
                        <th>Session ID</th>
                        <th>Hook Type</th>
                        <th>Score</th>
                        <th>Signals</th>
                        <th>Decision</th>
                    </tr>
                </thead>
                <tbody id="eventsTableBody">
                    <!-- Populated by JS -->
                </tbody>
            </table>
        </div>
    </main>

    <!-- Health Tab -->
    <main id="health" class="content">
        <div class="tab-error" id="error-health"></div>
        <div class="health-grid" id="healthGrid">
            <!-- Populated by JS -->
        </div>
    </main>

    <script>
        // State
        let currentTab = 'overview';
        let refreshInterval = null;
        let isRefreshing = false;

        // Elements
        const timeWindowSelect = document.getElementById('timeWindow');
        const autoRefreshToggle = document.getElementById('autoRefresh');
        const refreshBtn = document.getElementById('refreshBtn');
        const eventsLimitSelect = document.getElementById('eventsLimit');
        const lastUpdatedSpan = document.getElementById('lastUpdated');

        // Initialization
        function init() {
            // Tab switching
            document.querySelectorAll('.tab').forEach(tab => {
                tab.addEventListener('click', () => {
                    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                    document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
                    
                    tab.classList.add('active');
                    currentTab = tab.dataset.target;
                    document.getElementById(currentTab).classList.add('active');
                    
                    fetchData(); // Fetch when switching tabs
                });
            });

            // Event listeners
            timeWindowSelect.addEventListener('change', fetchData);
            eventsLimitSelect.addEventListener('change', () => {
                if(currentTab === 'events') fetchData();
            });
            refreshBtn.addEventListener('click', fetchData);
            
            autoRefreshToggle.addEventListener('change', (e) => {
                if (e.target.checked) {
                    startAutoRefresh();
                } else {
                    stopAutoRefresh();
                }
            });

            // Start
            startAutoRefresh();
            fetchData();
        }

        function startAutoRefresh() {
            if (refreshInterval) clearInterval(refreshInterval);
            refreshInterval = setInterval(() => {
                if (!isRefreshing) fetchData({ silent: true });
            }, 10000);
        }

        function stopAutoRefresh() {
            if (refreshInterval) {
                clearInterval(refreshInterval);
                refreshInterval = null;
            }
        }

        async function fetchData(options = { silent: false }) {
            isRefreshing = true;
            refreshBtn.textContent = 'Refreshing...';
            
            if (!options.silent) {
                const el = document.getElementById('loadingOverlay');
                if (el) el.style.display = 'flex';
            }
            
            try {
                if (currentTab === 'overview') {
                    await fetchOverview();
                } else if (currentTab === 'events') {
                    await fetchEvents();
                } else if (currentTab === 'health') {
                    await fetchHealth();
                }
                
                const now = new Date();
                lastUpdatedSpan.textContent = `Updated: ${now.toLocaleTimeString()}`;
            } catch (err) {
                console.error('Fetch error:', err);
                lastUpdatedSpan.textContent = `Error: ${err.message}`;
            } finally {
                isRefreshing = false;
                refreshBtn.textContent = 'Refresh Now';
                
                if (!options.silent) {
                    const el = document.getElementById('loadingOverlay');
                    if (el) el.style.display = 'none';
                }
            }
        }

        // Fake Data generators for UI testing if APIs aren't ready
        // We will try fetching real API first
        async function fetchAPI(endpoint) {
            const res = await fetch(endpoint);
            if (!res.ok) throw new Error(`API error: ${res.status}`);
            return await res.json();
        }

        function showTabError(tab, message) {
            const el = document.getElementById(`error-${tab}`);
            if (!el) return;
            el.textContent = message;
            el.classList.add('visible');
        }

        function clearTabError(tab) {
            const el = document.getElementById(`error-${tab}`);
            if (!el) return;
            el.textContent = '';
            el.classList.remove('visible');
        }

        async function fetchOverview() {
            const windowMs = timeWindowSelect.value;
            try {
                const data = await fetchAPI(`/api/summary?window=${windowMs}`);
                renderOverview(data);
                clearTabError('overview');
            } catch (e) {
                console.warn('Failed to fetch real summary, using fallback UI state');
                showTabError('overview', 'Failed to load: ' + e.message);
                // Could render empty state here, but we'll just log
            }
        }

        async function fetchEvents() {
            const limit = eventsLimitSelect.value;
            try {
                const data = await fetchAPI(`/api/events?limit=${limit}`);
                renderEvents(data);
                clearTabError('events');
            } catch (e) {
                console.warn('Failed to fetch real events');
                showTabError('events', 'Failed to load: ' + e.message);
            }
        }

        async function fetchHealth() {
             try {
                 const data = await fetchAPI(`/api/health`);
                 renderHealth(data);
                 clearTabError('health');
             } catch (e) {
                 console.warn('Failed to fetch real health');
                 showTabError('health', 'Failed to load: ' + e.message);
             }
         }

         function formatAge(seconds) {
             if (seconds < 60) return `${Math.floor(seconds)}s`;
             if (seconds < 3600) return `${Math.floor(seconds / 60)}m`;
             if (seconds < 86400) return `${Math.floor(seconds / 3600)}h`;
             return `${Math.floor(seconds / 86400)}d`;
         }

        function renderOverview(data) {
             // Stats
             document.getElementById('stat-total-events').textContent = data.total_events || 0;
             document.getElementById('stat-ingests').textContent = data.ingests_today ?? 0;
             document.getElementById('stat-skipped').textContent = data.total_skips || 0;
             document.getElementById('stat-vetoed').textContent = data.total_vetoes || 0;
            
            const avg = data.avg_score || 0;
            document.getElementById('stat-avg-score').textContent = typeof avg === 'number' ? avg.toFixed(1) : avg;
            document.getElementById('stat-peak-score').textContent = data.peak_score || 0;

            // Lag Indicator & Timestamps
            if (data.last_ingest_ts) {
                const d = new Date(data.last_ingest_ts);
                document.getElementById('lastIngestTs').textContent = d.toLocaleString();
            } else {
                document.getElementById('lastIngestTs').textContent = 'Never';
            }

            const walInd = document.getElementById('lagIndicator');
            const walText = document.getElementById('walCheckpointText');
            walInd.className = 'lag-indicator';
            if (data.wal_checkpoint_age_seconds == null) {
                walText.textContent = 'WAL checkpoint: unknown';
            } else {
                walText.textContent = `WAL last checkpoint: ${formatAge(data.wal_checkpoint_age_seconds)} ago`;
                if (data.wal_checkpoint_age_seconds > 3600) walInd.classList.add('lag-warning');
                if (data.wal_checkpoint_age_seconds > 86400) walInd.classList.add('lag-error');
            }

            // Score Distribution
            renderBarChart('chart-scores', data.score_distribution || {}, 'var(--accent)');
            
            // Signal Frequency
            renderBarChart('chart-signals', data.signal_frequency || {}, 'var(--accent)');

            // Hook Types (with colors)
            const hooksContainer = document.getElementById('chart-hooks');
            hooksContainer.innerHTML = '';
            
            const hooks = data.by_hook_type || {};
            const maxHook = Math.max(...Object.values(hooks), 1);
            
            Object.entries(hooks)
                .sort((a,b) => b[1] - a[1])
                .forEach(([type, count]) => {
                    const pct = (count / maxHook) * 100;
                    const typeClass = type === 'stop' ? 'type-stop' : 
                                      type === 'subagent-stop' ? 'type-subagent-stop' : 
                                      type === 'session-end' ? 'type-session-end' : '';
                                      
                    hooksContainer.innerHTML += `
                        <div class="bar-row">
                            <div class="bar-label" title="${type}">${type}</div>
                            <div class="bar-track">
                                <div class="bar-fill ${typeClass}" style="width: ${pct}%"></div>
                            </div>
                            <div class="bar-value">${count}</div>
                        </div>
                    `;
                });
        }

        function renderBarChart(containerId, dataObj, color) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            
            const entries = Object.entries(dataObj).sort((a,b) => b[1] - a[1]).slice(0, 10);
            if (entries.length === 0) {
                container.innerHTML = '<div style="color: var(--text-muted); font-size: 0.875rem;">No data</div>';
                return;
            }
            
            const maxVal = Math.max(...entries.map(e => e[1]), 1);
            
            entries.forEach(([label, value]) => {
                const pct = (value / maxVal) * 100;
                container.innerHTML += `
                    <div class="bar-row">
                        <div class="bar-label" title="${label}">${label}</div>
                        <div class="bar-track">
                            <div class="bar-fill" style="width: ${pct}%; background-color: ${color}"></div>
                        </div>
                        <div class="bar-value">${value}</div>
                    </div>
                `;
            });
        }

        function renderEvents(data) {
            const tbody = document.getElementById('eventsTableBody');
            tbody.innerHTML = '';
            
            if (!data || !data.length) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align: center; color: var(--text-muted);">No events found</td></tr>';
                return;
            }
            
            data.forEach(evt => {
                const d = new Date(evt.ts);
                const timeStr = d.toLocaleString();
                
                // Truncate session ID
                const sessId = (evt.session_id || '').substring(0, 12) + ((evt.session_id || '').length > 12 ? '...' : '');
                
                // Truncate signals
                let signalsText = '';
                if (Array.isArray(evt.signals)) {
                    signalsText = evt.signals.slice(0, 3).join(', ');
                    if (evt.signals.length > 3) signalsText += ` (+${evt.signals.length - 3} more)`;
                } else if (typeof evt.signals === 'string') {
                    signalsText = evt.signals.substring(0, 50) + (evt.signals.length > 50 ? '...' : '');
                }
                
                const decision = (evt.decision || 'skip').toLowerCase();
                const rowClass = `row-${decision}`;
                const decClass = `decision-${decision}`;
                
                tbody.innerHTML += `
                    <tr class="${rowClass}">
                        <td class="mono">${timeStr}</td>
                        <td class="mono" title="${evt.session_id}">${sessId}</td>
                        <td>${evt.hook_type || '-'}</td>
                        <td class="mono">${evt.score !== undefined ? evt.score : '-'}</td>
                        <td title="${evt.signals}">${signalsText}</td>
                        <td class="${decClass}">${decision.toUpperCase()}</td>
                    </tr>
                `;
            });
        }

        function renderHealth(data) {
            const grid = document.getElementById('healthGrid');
            grid.innerHTML = '';
            
            // data should be array of CheckItem: { name, status (Pass|Warn|Fail), message }
            const checks = Array.isArray(data) ? data : data.checks || [];
            
            if (checks.length === 0) {
                grid.innerHTML = '<div style="color: var(--text-muted); padding: 1rem;">No health checks reported.</div>';
                return;
            }
            
            checks.forEach(chk => {
                const status = (chk.status || 'unknown').toLowerCase();
                const statusClass = `status-${status}`;
                
                grid.innerHTML += `
                    <div class="health-item">
                        <div class="health-status ${statusClass}">${status}</div>
                        <div class="health-details">
                            <div class="health-name">${chk.name || chk.id || 'Unknown Check'}</div>
                            <div class="health-msg">${chk.message || chk.msg || ''}</div>
                        </div>
                    </div>
                `;
            });
        }

         // Boot
         document.addEventListener('DOMContentLoaded', init);
     </script>
     <div class="loading-overlay" id="loadingOverlay"><div class="spinner"></div></div>
 </body>
</html>
